<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Queue</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
  <script src="./context/themeContext.js"></script>
  <style>
    :root {
      --theme-background: rgba(12, 12, 12, 0.95);
      --theme-text-primary: #fff;
      --theme-border-color: rgba(255, 255, 255, 0.1);
      --theme-button-bg: rgba(255, 255, 255, 0.05);
      --theme-button-bg-hover: rgba(255, 255, 255, 0.1);
      --theme-border-color-button: rgba(255, 255, 255, 0.08);
      --theme-text-opacity: rgba(255, 255, 255, 0.7);
      --theme-icon-color: #fff;
      --theme-glitch-color-1: #3cfaff;
      --theme-glitch-color-2: #ff3d6e;
      --theme-blend-mode: lighten;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Pixelify Sans', sans-serif;
      color: var(--theme-text-primary);
    }

    .queue-container {
      width: 280px;
      background: var(--theme-background);
      backdrop-filter: blur(6px);
      border-radius: 10px;
      border: 1px solid var(--theme-border-color);
      padding: 8px;
      -webkit-app-region: drag;
    }

    .queue-header {
      display: none;
    }

    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 300px;
      overflow-y: auto;
    }

    .queue-item {
      padding: 6px 8px;
      background: var(--theme-button-bg);
      border-radius: 4px;
      border: 1px solid var(--theme-border-color-button);
      color: var(--theme-text-primary);
      font-size: 10px;
      line-height: 1.3;
      -webkit-app-region: no-drag;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .queue-item:hover {
      background: var(--theme-button-bg-hover);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .queue-item-title {
      font-weight: 400;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .queue-item-info {
      display: flex;
      align-items: center;
      gap: 2px;
      white-space: nowrap;
      opacity: 0.75;
      flex-shrink: 0;
    }

    .queue-item-artist {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }

    .queue-item-duration {
      white-space: nowrap;
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .queue-item.fade-out {
      animation: fadeOut 0.4s ease-out forwards;
    }

    .queue-item.slide-up {
      animation: slideUp 0.4s ease-out forwards;
    }

    .queue-item.slide-down {
      animation: slideDown 0.4s ease-out forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      .queue-item.fade-out,
      .queue-item.slide-up,
      .queue-item.slide-down {
        animation: none;
      }
    }

    .queue-item.current {
      color: var(--theme-queue-item-current);
      background: var(--theme-queue-item-current-bg);
      border-color: var(--theme-queue-item-current-border);
    }

    .queue-item.current:hover {
      background: rgba(60, 250, 255, 0.15);
      border-color: rgba(60, 250, 255, 0.3);
    }

    .queue-empty {
      color: #999;
      text-align: center;
      padding: 20px 10px;
      font-size: 12px;
    }

    /* Scrollbar styling */
    .queue-list::-webkit-scrollbar {
      width: 6px;
    }
    .queue-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }
    .queue-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }
    .queue-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="queue-container">
    <div class="queue-header">Up Next (3)</div>
    <div class="queue-list" id="queueList">
      <div class="queue-empty">Loading...</div>
    </div>
  </div>

  <script>
    const queueList = document.getElementById('queueList');
    let lastCurrentSongId = null;
    let lastUpcomingIds = [];

    const fmt = ms => {
      if (!Number.isFinite(ms)) return '0:00';
      ms = Math.max(0, Math.floor(ms));
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const sec = String(s % 60).padStart(2,'0');
      return `${m}:${sec}`;
    };

    function determineDirection(newCurrentId, oldUpcomingIds) {
      // Check if the new current song was the first in the old upcoming queue (next action)
      if (oldUpcomingIds.length > 0 && oldUpcomingIds[0] === newCurrentId) {
        return 'next';
      }
      // Otherwise assume previous
      return 'previous';
    }

    function renderQueue(currentSong, upcomingSongs, animate = false, direction = 'next') {
      const items = [];

      if (currentSong) {
        items.push(`
          <div class="queue-item current">
            <div class="queue-item-title">${currentSong.name} - ${currentSong.artists?.[0]?.name || 'Unknown'}</div>
            <div class="queue-item-duration">${fmt(currentSong.duration_ms || 0)}</div>
          </div>
        `);
      }

      if (upcomingSongs && upcomingSongs.length > 0) {
        const limited = upcomingSongs.slice(0, 2);
        items.push(...limited.map(song => `
          <div class="queue-item">
            <div class="queue-item-title">${song.name} - ${song.artists?.[0]?.name || 'Unknown'}</div>
            <div class="queue-item-duration">${fmt(song.duration_ms || 0)}</div>
          </div>
        `));
      }

      if (items.length === 0) {
        queueList.innerHTML = '<div class="queue-empty">No songs</div>';
        return;
      }

      if (animate && lastCurrentSongId !== null) {
        // Fade out current song
        const currentItems = queueList.querySelectorAll('.queue-item');
        if (currentItems.length > 0) {
          currentItems[0].classList.add('fade-out');
        }

        // After fade out, update DOM and animate remaining items
        setTimeout(() => {
          queueList.innerHTML = items.join('');
          const newItems = queueList.querySelectorAll('.queue-item');
          // Animate items that moved up/down (skip the first one which is the new current)
          newItems.forEach((item, index) => {
            if (index > 0) {
              if (direction === 'next') {
                item.classList.add('slide-up');
              } else {
                item.classList.add('slide-down');
              }
            }
          });
        }, 200);
      } else {
        queueList.innerHTML = items.join('');
      }
    }

    async function refreshQueue() {
      try {
        const currentData = await window.api.getCurrent();
        const queueData = await window.api.getQueue();
        
        const currentSong = currentData?.item || null;
        const upcomingSongs = queueData?.queue || [];
        const currentSongId = currentSong?.id;

        // Check if song changed
        const songChanged = lastCurrentSongId !== null && lastCurrentSongId !== currentSongId;
        
        let direction = 'next';
        if (songChanged) {
          direction = determineDirection(currentSongId, lastUpcomingIds);
        }
        
        renderQueue(currentSong, upcomingSongs, songChanged, direction);
        lastCurrentSongId = currentSongId;
        lastUpcomingIds = upcomingSongs.map(song => song.id);
      } catch (e) {
        console.error('Failed to fetch queue:', e);
        queueList.innerHTML = '<div class="queue-empty">Error loading queue</div>';
      }
    }

    // Refresh queue every 2 seconds
    setInterval(refreshQueue, 2000);
    refreshQueue();

    // Close queue window when user logs out
    if (window.api && window.api.onLoggedOut) {
      window.api.onLoggedOut(() => {
        window.close();
      });
    }

    // Initialize theme
    initThemeVariables();
    loadInitialTheme();
    setupThemeListener();
  </script>
</body>
</html>
