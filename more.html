<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>More</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
  <script src="./context/themeContext.js"></script>
  <style>
    :root {
      --theme-background-light: rgba(12, 12, 12, 0.65);
      --theme-text-primary: #fff;
      --theme-border-color: rgba(255, 255, 255, 0.1);
      --theme-button-bg: rgba(255, 255, 255, 0.05);
      --theme-button-bg-hover: rgba(255, 255, 255, 0.1);
      --theme-accent-danger: rgba(255, 100, 100, 0.2);
      --theme-accent-danger-border: rgba(255, 100, 100, 0.3);
      --theme-accent-danger-hover: rgba(255, 100, 100, 0.3);
      --theme-border-color-hover: rgba(255, 255, 255, 0.15);
      --theme-button-bg-active: rgba(255, 255, 255, 0.15);
      --theme-icon-color: #fff;
      --theme-glitch-color-1: #3cfaff;
      --theme-glitch-color-2: #ff3d6e;
      --theme-blend-mode: lighten;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Pixelify Sans', sans-serif;
      color: var(--theme-text-primary);
    }

    .more-container {
      width: 120px;
      background: var(--theme-background-light);
      backdrop-filter: blur(6px);
      border-radius: 10px;
      border: 1px solid var(--theme-border-color);
      padding: 8px;
      -webkit-app-region: drag;
    }

    .more-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .more-message {
      display: none;
      color: var(--theme-text-primary);
      font-size: 10px;
      line-height: 1.3;
      padding: 8px;
      margin-bottom: 8px;
      background: rgba(255, 100, 100, 0.1);
      border-radius: 4px;
      border: 1px solid rgba(255, 100, 100, 0.2);
      text-align: center;
    }

    .more-message.show {
      display: block;
    }

    .more-btn {
      padding: 8px 12px;
      background: var(--theme-button-bg);
      border: 1px solid var(--theme-border-color);
      border-radius: 4px;
      color: var(--theme-text-primary);
      font-size: 11px;
      font-family: 'Pixelify Sans', sans-serif;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: background 0.2s;
    }

    .more-btn:hover {
      background: var(--theme-button-bg-hover);
      border-color: var(--theme-border-color-hover);
    }

    .more-btn:active {
      background: var(--theme-button-bg-active);
    }

    .more-btn.hidden {
      display: none;
    }

    .confirm-buttons {
      display: none;
      flex-direction: row;
      gap: 4px;
    }

    .confirm-buttons button {
      padding: 6px 8px;
      border: 1px solid var(--theme-border-color);
      border-radius: 4px;
      background: var(--theme-button-bg);
      color: var(--theme-text-primary);
      font-family: 'Pixelify Sans', sans-serif;
      font-size: 10px;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      -webkit-app-region: no-drag;
    }

    .confirm-buttons button:hover {
      background: var(--theme-button-bg-hover);
      border-color: var(--theme-border-color-hover);
    }

    .confirm-buttons .confirm-yes {
      background: var(--theme-accent-danger);
      border-color: var(--theme-accent-danger-border);
    }

    .confirm-buttons .confirm-yes:hover {
      background: var(--theme-accent-danger-hover);
      border-color: var(--theme-accent-danger-border);
    }
  </style>
</head>
<body>
  <div class="more-container">
    <div class="more-message" id="confirmMessage"></div>
    <div class="more-list" id="moreList">
      <button class="more-btn" id="accountBtn">Account</button>
      <button class="more-btn" id="settingsBtn">Settings</button>
      <button class="more-btn" id="closeBtn">Close App</button>
    </div>
    <div class="confirm-buttons" id="confirmButtons">
      <button class="confirm-yes" id="confirmYes">Yes</button>
      <button class="confirm-no" id="confirmNo">No</button>
    </div>
  </div>

  <script>
    const moreList = document.getElementById('moreList');
    const confirmButtons = document.getElementById('confirmButtons');
    const confirmMessage = document.getElementById('confirmMessage');
    const accountBtn = document.getElementById('accountBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeBtn = document.getElementById('closeBtn');
    const confirmYes = document.getElementById('confirmYes');
    const confirmNo = document.getElementById('confirmNo');

    let confirmAction = null;

    function showConfirm(message, action) {
      moreList.style.display = 'none';
      confirmButtons.style.display = 'flex';
      confirmMessage.textContent = message;
      confirmMessage.classList.add('show');
      confirmAction = action;
    }

    function hideConfirm() {
      moreList.style.display = 'flex';
      confirmButtons.style.display = 'none';
      confirmMessage.classList.remove('show');
      confirmMessage.textContent = '';
      confirmAction = null;
    }

    accountBtn.addEventListener('click', async () => {
      try {
        await window.api.openSpotifyAccount();
      } catch (err) {
        console.error('openSpotifyAccount failed', err);
      }
    });

    settingsBtn.addEventListener('click', async () => {
      try {
        await window.api.toggleSettings();
      } catch (err) {
        console.error('toggleSettings failed', err);
      }
    });

    closeBtn.addEventListener('click', () => {
      showConfirm('Are you sure you want to close MiniBox?', async () => {
        try {
          await window.api.closeApp();
        } catch (err) {
          console.error('closeApp failed', err);
        }
      });
    });

    confirmYes.addEventListener('click', () => {
      if (confirmAction) {
        confirmAction();
      }
    });

    confirmNo.addEventListener('click', () => {
      hideConfirm();
    });

    // Listen for authentication state changes
    if (window.api && window.api.onLoggedOut) {
      window.api.onLoggedOut(() => {
        accountBtn.classList.add('hidden');
        settingsBtn.classList.add('hidden');
      });
    }

    if (window.api && window.api.onAuthed) {
      window.api.onAuthed(() => {
        accountBtn.classList.remove('hidden');
        settingsBtn.classList.remove('hidden');
      });
    }

    // Check initial auth state
    async function checkAuthStateOnLoad() {
      try {
        const authed = await window.api.isAuthed();
        if (!authed) {
          accountBtn.classList.add('hidden');
          settingsBtn.classList.add('hidden');
        }
      } catch (err) {
        console.error('Failed to check auth state:', err);
      }
    }

    // Check auth state when window loads
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', checkAuthStateOnLoad);
    } else {
      checkAuthStateOnLoad();
    }

    // Initialize theme
    initThemeVariables();
    loadInitialTheme();
    setupThemeListener();
  </script>
</body>
</html>
