<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
  <script src="../context/themeContext.js"></script>
  <style>
    :root {
      --theme-background: rgba(12, 12, 12, 0.95);
      --theme-text-primary: #fff;
      --theme-border-color: rgba(255, 255, 255, 0.1);
      --theme-button-bg: rgba(255, 255, 255, 0.05);
      --theme-button-bg-hover: rgba(255, 255, 255, 0.1);
      --theme-button-bg-active: rgba(255, 255, 255, 0.15);
      --theme-border-color-hover: rgba(255, 255, 255, 0.15);
      --theme-accent-danger: rgba(255, 100, 100, 0.1);
      --theme-accent-danger-border: rgba(255, 100, 100, 0.2);
      --theme-accent-danger-hover: rgba(255, 100, 100, 0.2);
      --theme-text-opacity: rgba(255, 255, 255, 0.7);
      --theme-icon-color: #fff;
      --theme-glitch-color-1: #3cfaff;
      --theme-glitch-color-2: #ff3d6e;
      --theme-blend-mode: lighten;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Pixelify Sans', sans-serif;
      color: var(--theme-text-primary);
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      display: none;
    }

    .settings-container {
      width: 320px;
      height: 170px;
      background: var(--theme-background);
      backdrop-filter: blur(6px);
      border-radius: 10px;
      border: 1px solid var(--theme-border-color);
      padding: 16px;
      -webkit-app-region: drag;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .settings-container.modal-open {
      overflow: hidden;
    }

    .settings-container::-webkit-scrollbar {
      display: none;
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .settings-title {
      font-size: 13px;
      color: var(--theme-text-primary);
    }

    .settings-close-btn {
      -webkit-app-region: no-drag;
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: var(--theme-text-opacity);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .settings-close-btn:hover {
      color: var(--theme-text-primary);
    }

    .settings-close-btn.back-mode {
      width: auto;
      padding: 4px 8px;
      border: 1px solid var(--theme-border-color);
      border-radius: 4px;
      background: var(--theme-button-bg);
      color: var(--theme-text-primary);
      font-size: 10px;
      font-family: 'Pixelify Sans', sans-serif;
    }

    .settings-close-btn.back-mode:hover {
      background: var(--theme-button-bg-hover);
      border-color: var(--theme-border-color-hover);
    }



    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-app-region: drag;
    }

    .settings-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      border: 1px solid var(--theme-border-color);
      -webkit-app-region: no-drag;
    }

    .settings-item.stacked {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }

    .settings-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .settings-item-header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    .settings-label {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--theme-text-primary);
    }

    .theme-btn {
      padding: 4px 8px;
      background: var(--theme-button-bg);
      border: 1px solid var(--theme-border-color);
      border-radius: 4px;
      color: var(--theme-text-primary);
      font-size: 10px;
      font-family: 'Pixelify Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .theme-btn.active {
      background: var(--theme-button-bg-active);
      border-color: var(--theme-border-color-hover);
    }

    .theme-btn:hover {
      background: var(--theme-button-bg-hover);
      border-color: var(--theme-border-color-hover);
    }

    .theme-picker-trigger {
      min-width: 110px;
      text-align: left;
    }

    .theme-modal {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
      z-index: 30;
      -webkit-app-region: no-drag;
    }

    .theme-modal.show {
      display: flex;
    }

    .theme-modal-content {
      width: min(240px, calc(100% - 30px));
      max-height: min(200px, calc(100% - 24px));
      background: var(--theme-background);
      border: 1px solid var(--theme-border-color-hover);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .theme-modal-header {
      font-size: 11px;
      color: var(--theme-text-opacity);
    }

    .theme-modal-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 130px;
      overflow-y: auto;
      overscroll-behavior: contain;
      -ms-scroll-chaining: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.25) transparent;
      padding-right: 2px;
    }

    .theme-modal-list::-webkit-scrollbar {
      width: 8px;
      background: transparent;
    }

    .theme-modal-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .theme-modal-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .theme-modal-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.32);
    }

    .theme-option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      border: 1px solid var(--theme-border-color);
      border-radius: 6px;
      background: var(--theme-button-bg);
      color: var(--theme-text-primary);
      font-family: 'Pixelify Sans', sans-serif;
      font-size: 11px;
      cursor: pointer;
    }

    .theme-option:hover {
      background: var(--theme-button-bg-hover);
      border-color: var(--theme-border-color-hover);
    }

    .theme-option.active {
      background: var(--theme-button-bg-active);
      border-color: var(--theme-border-color-hover);
    }

    .theme-option-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .theme-option-status {
      font-size: 10px;
      color: var(--theme-text-opacity);
      margin-left: 8px;
      flex-shrink: 0;
    }

    .runtime-display {
      font-size: 11px;
      color: var(--theme-text-opacity);
    }

    .spotify-setup-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .spotify-setup-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .spotify-input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--theme-border-color);
      border-radius: 6px;
      color: var(--theme-text-primary);
      font-size: 11px;
      font-family: 'Pixelify Sans', sans-serif;
    }

    .spotify-input[readonly] {
      color: var(--theme-text-opacity);
    }
    .tooltip-trigger {
      width: 20px;
      height: 20px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--theme-button-bg);
      border: 1px solid var(--theme-border-color);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tooltip-trigger:hover {
      background: var(--theme-button-bg-hover);
      border-color: var(--theme-border-color-hover);
    }

    .tooltip-trigger:active {
      background: var(--theme-button-bg-active);
    }

    .tooltip-trigger img {
      width: 16px;
      height: 16px;
      display: block;
    }

    .spotify-tooltip {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 220px;
      padding: 10px 12px;
      background: var(--theme-background);
      border-radius: 8px;
      backdrop-filter: blur(6px);
      color: var(--theme-text-primary);
      font-size: 11px;
      line-height: 1.5;
      display: none;
      z-index: 20;
    }

    .spotify-tooltip.show {
      display: block;
    }

    .settings-buttons {
      display: flex;
      gap: 4px;
      margin-top: auto;
      -webkit-app-region: no-drag;
    }

    .settings-btn {
      flex: 1;
      padding: 6px 8px;
      background: var(--theme-button-bg);
      border: 1px solid var(--theme-border-color);
      border-radius: 4px;
      color: var(--theme-text-primary);
      font-size: 11px;
      font-family: 'Pixelify Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .settings-btn:hover {
      background: var(--theme-button-bg-hover);
      border-color: var(--theme-border-color-hover);
    }

    .settings-btn:active {
      background: var(--theme-button-bg-active);
    }

    .settings-btn.danger {
      background: var(--theme-accent-danger);
      border-color: var(--theme-accent-danger-border);
    }

    .settings-btn.danger:hover {
      background: var(--theme-accent-danger-hover);
      border-color: var(--theme-accent-danger-border);
    }

    .confirm-dialog {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--theme-background);
      border: 1px solid var(--theme-accent-danger-border);
      border-radius: 8px;
      padding: 16px;
      min-width: 210px;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .confirm-dialog.show {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .confirm-message {
      font-size: 12px;
      text-align: center;
      color: var(--theme-text-primary);
    }

    .confirm-dialog-buttons {
      display: flex;
      gap: 8px;
    }

    .confirm-dialog-buttons button {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--theme-border-color);
      border-radius: 4px;
      background: var(--theme-button-bg);
      color: var(--theme-text-primary);
      font-family: 'Pixelify Sans', sans-serif;
      font-size: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .confirm-dialog-buttons button:hover {
      background: var(--theme-button-bg-hover);
    }

    .confirm-dialog-buttons .confirm-yes {
      background: var(--theme-accent-danger);
      border-color: var(--theme-accent-danger-border);
    }

    .confirm-dialog-buttons .confirm-yes:hover {
      background: var(--theme-accent-danger-hover);
    }

    .cache-dialog {
      display: none;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--theme-border-color);
      border-radius: 8px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      -webkit-app-region: no-drag;
    }

    .cache-dialog.show {
      display: flex;
    }

    .cache-dialog-title {
      font-size: 12px;
      color: var(--theme-text-primary);
    }

    .cache-dialog-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 190px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .cache-dialog-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--theme-text-opacity);
    }

    .cache-dialog-item input {
      margin: 0;
    }

    .cache-dialog-actions {
      display: flex;
      gap: 8px;
    }

    .cache-dialog-actions button {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--theme-border-color);
      border-radius: 4px;
      background: var(--theme-button-bg);
      color: var(--theme-text-primary);
      font-family: 'Pixelify Sans', sans-serif;
      font-size: 10px;
      cursor: pointer;
    }

    .cache-dialog-actions button:hover {
      background: var(--theme-button-bg-hover);
      border-color: var(--theme-border-color-hover);
    }
  </style>
</head>
<body>
  <div class="settings-container">
    <div class="settings-header">
      <div class="settings-title" id="settingsTitle">Settings</div>
      <button class="settings-close-btn" id="closeSettingsBtn" title="Close">✕</button>
    </div>
    <div class="settings-section" id="settingsMainSection">
      <!-- Theme -->
      <div class="settings-item">
        <span class="settings-label">Theme:</span>
        <button class="theme-btn theme-picker-trigger" id="themePickerBtn">Select Theme</button>
      </div>
      <div class="settings-item">
        <span class="settings-label">Pet:</span>
        <button class="theme-btn theme-picker-trigger" id="petPickerBtn">Select Pet</button>
      </div>
      <!-- Source Mode Toggle -->
      <div class="settings-item">
        <span class="settings-label">Source:</span>
        <div style="display: flex; gap: 4px;">
          <button class="theme-btn active" id="spotifySource">Spotify</button>
          <button class="theme-btn" id="localSource">Local Files</button>
        </div>
      </div>
      <!-- App Runtime Display -->
      <div class="settings-item">
        <span class="settings-label">App Runtime:</span>
        <span class="runtime-display" id="runtime">00:00:00</span>
      </div>
      <!-- Version Display -->
      <div class="settings-item">
        <span class="settings-label">Version:</span>
        <span class="runtime-display" id="version">v1.0.0</span>
      </div>
      <!-- Update Check --> 
      <div class="settings-item">
        <span class="settings-label">Update:</span>
        <div style="display: flex; gap: 4px; align-items: center;">
          <button class="theme-btn" id="checkUpdatesBtn" style="padding: 2px 6px; font-size: 11px;">Check</button>
          <span class="runtime-display" id="updateStatus"></span>
        </div>
      </div>
      <!-- Build Info Display -->
      <div class="settings-item">
        <span class="settings-label">Build:</span>
        <span class="runtime-display" id="buildInfo">Electron -</span>
      </div>
      <div class="settings-item">
        <span class="settings-label">Spotify API:</span>
        <span class="runtime-display" id="spotifyApiUsage">Last 60s: 0 requests (cap 60/min)</span>
      </div>
      <!-- Patch Notes Button -->
      <div class="settings-item">
        <span class="settings-label">Patch Notes:</span>
        <button class="theme-btn" id="viewPatchBtn" style="padding: 2px 6px; font-size: 11px;">View</button>
      </div>
      <div class="settings-item">
        <span class="settings-label">How to Use:</span>
        <button class="theme-btn" id="openOnboardingBtn" style="padding: 2px 6px; font-size: 11px;">Open</button>
      </div>
      <div class="settings-item">
        <span class="settings-label">Spotify Setup:</span>
        <button class="theme-btn" id="openSetupBtn" style="padding: 2px 6px; font-size: 11px;">Open</button>
      </div>
      <div class="settings-item">
        <span class="settings-label">Support:</span>
        <button class="theme-btn" id="supportBtn" style="padding: 2px 6px; font-size: 11px;">Buy Me a Coffee</button>
      </div>
    </div>
    <div class="theme-modal" id="themeModal">
      <div class="theme-modal-content">
        <div class="theme-modal-header" id="themeModalHeader">Current: Dark</div>
        <div class="theme-modal-list" id="themeModalList"></div>
      </div>
    </div>
    <div class="theme-modal" id="petModal">
      <div class="theme-modal-content">
        <div class="theme-modal-header" id="petModalHeader">Current: None</div>
        <div class="theme-modal-list" id="petModalList"></div>
      </div>
    </div>
    <!-- Action Buttons -->
    <div class="settings-buttons">
      <button class="settings-btn danger" id="signOutBtn">Sign Out</button>
      <button class="settings-btn" id="clearCacheBtn">Clear Cache</button>
    </div>
    <div class="cache-dialog" id="cacheDialog">
      <div class="cache-dialog-title">Choose data to clear</div>
      <div class="cache-dialog-list" id="cacheDialogList">
        <label class="cache-dialog-item"><input type="checkbox" id="cacheSelectAll"> <strong>Select All</strong></label>
        <label class="cache-dialog-item"><input type="checkbox" class="cache-option" value="spotifyAuth"> Spotify auth tokens/session</label>
        <label class="cache-dialog-item"><input type="checkbox" class="cache-option" value="spotifyClientId"> Spotify Client ID</label>
        <label class="cache-dialog-item"><input type="checkbox" class="cache-option" value="updatePrompts"> Update prompt reminders</label>
        <label class="cache-dialog-item"><input type="checkbox" class="cache-option" value="onboarding"> Onboarding completion state</label>
        <label class="cache-dialog-item"><input type="checkbox" class="cache-option" value="theme"> Theme preference</label>
        <label class="cache-dialog-item"><input type="checkbox" class="cache-option" value="sourceMode"> Source mode preference</label>
        <label class="cache-dialog-item"><input type="checkbox" class="cache-option" value="localAudio"> Imported local audio + active selection</label>
        <label class="cache-dialog-item"><input type="checkbox" class="cache-option" value="runtime"> App runtime counters</label>
      </div>
      <div class="cache-dialog-actions">
        <button id="cacheDialogApplyBtn">Clear Selected</button>
      </div>
    </div>
  </div>

  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-message" id="confirmMessage"></div>
    <div class="confirm-dialog-buttons">
      <button class="confirm-no" id="confirmNo">Cancel</button>
      <button class="confirm-yes" id="confirmYes">Confirm</button>
    </div>
  </div>

  <script>
    const themePickerBtn = document.getElementById('themePickerBtn');
    const themeModal = document.getElementById('themeModal');
    const themeModalHeader = document.getElementById('themeModalHeader');
    const themeModalList = document.getElementById('themeModalList');
    const petPickerBtn = document.getElementById('petPickerBtn');
    const petModal = document.getElementById('petModal');
    const petModalHeader = document.getElementById('petModalHeader');
    const petModalList = document.getElementById('petModalList');
    const spotifySource = document.getElementById('spotifySource');
    const localSource = document.getElementById('localSource');
    const runtimeDisplay = document.getElementById('runtime');
    const versionDisplay = document.getElementById('version');
    const buildInfoDisplay = document.getElementById('buildInfo');
    const spotifyApiUsageDisplay = document.getElementById('spotifyApiUsage');
    const checkUpdatesBtn = document.getElementById('checkUpdatesBtn');
    const updateStatusDisplay = document.getElementById('updateStatus');
    const signOutBtn = document.getElementById('signOutBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const settingsTitle = document.getElementById('settingsTitle');
    const settingsMainSection = document.getElementById('settingsMainSection');
    const settingsButtons = document.querySelector('.settings-buttons');
    const settingsContainer = document.querySelector('.settings-container');
    const confirmDialog = document.getElementById('confirmDialog');
    const confirmMessage = document.getElementById('confirmMessage');
    const confirmYes = document.getElementById('confirmYes');
    const confirmNo = document.getElementById('confirmNo');
    const clearCacheBtn = document.getElementById('clearCacheBtn');
    const viewPatchBtn = document.getElementById('viewPatchBtn');
    const openOnboardingBtn = document.getElementById('openOnboardingBtn');
    const openSetupBtn = document.getElementById('openSetupBtn');
    const supportBtn = document.getElementById('supportBtn');
    const cacheDialog = document.getElementById('cacheDialog');
    const cacheSelectAll = document.getElementById('cacheSelectAll');
    const cacheOptionNodes = Array.from(document.querySelectorAll('.cache-option'));
    const cacheDialogApplyBtn = document.getElementById('cacheDialogApplyBtn');

    let confirmAction = null;
    let activeTheme = 'dark';
    let activePet = 'none';
    const themeCatalog = window.availableThemes || { dark: { label: 'Dark' }, light: { label: 'Light' } };
    const petCatalog = {
      none: { label: 'None' },
      sleepycat: { label: 'SleepyCat - Gray' },
      'sleepycat-orange': { label: 'SleepyCat - Orange' },
      'sleepycat-black': { label: 'SleepyCat - Black' }
    };

    // Format time from milliseconds
    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    // Update runtime every second
    function updateRuntime() {
      if (window.api && window.api.getAppRuntime) {
        window.api.getAppRuntime().then(ms => {
          runtimeDisplay.textContent = formatTime(ms);
        }).catch(err => console.error('Failed to get app runtime:', err));
      }
    }

    updateRuntime();
    setInterval(updateRuntime, 1000);

    // Load version and build info
    function loadVersionInfo() {
      if (window.api && window.api.getVersion) {
        window.api.getVersion().then(version => {
          versionDisplay.textContent = `v${version}`;
        }).catch(err => console.error('Failed to get version:', err));
      }
      if (window.api && window.api.getBuildInfo) {
        window.api.getBuildInfo().then(buildInfo => {
          buildInfoDisplay.textContent = buildInfo;
        }).catch(err => console.error('Failed to get build info:', err));
      }
    }

    loadVersionInfo();

    function updateSpotifyApiUsage() {
      if (!window.api || !window.api.getSpotifyApiUsageStatus) {
        return;
      }

      window.api.getSpotifyApiUsageStatus().then((status) => {
        const current = Number(status?.requestsPerMinute || 0);
        const cap = Number(status?.maxRequestsPerMinute || 60);
        spotifyApiUsageDisplay.textContent = `Last 60s: ${current} requests (cap ${cap}/min)`;
      }).catch(() => {
        spotifyApiUsageDisplay.textContent = '--';
      });
    }

    updateSpotifyApiUsage();
    setInterval(updateSpotifyApiUsage, 1000);

    closeSettingsBtn.addEventListener('click', async () => {
      if (petModal.classList.contains('show')) {
        closePetModal();
        return;
      }

      if (themeModal.classList.contains('show')) {
        closeThemeModal();
        return;
      }

      if (cacheDialog.classList.contains('show')) {
        closeCacheDialog();
        return;
      }

      try {
        await window.api.toggleSettings();
      } catch (err) {
        console.error('Failed to close settings window:', err);
      }
    });

    // Check for updates
    checkUpdatesBtn.addEventListener('click', async () => {
      checkUpdatesBtn.style.display = 'none';
      updateStatusDisplay.textContent = 'Checking...';
      try {
        await window.api.checkForUpdates();
      } catch (err) {
        updateStatusDisplay.textContent = 'Error';
        checkUpdatesBtn.style.display = '';
        console.error('Failed to check for updates:', err);
      }
    });

    // Listen for update status changes
    if (window.api && window.api.onUpdateStatusChanged) {
      window.api.onUpdateStatusChanged((_e, { status, info }) => {
        if (status === 'checking') {
          updateStatusDisplay.textContent = 'Checking...';
          checkUpdatesBtn.style.display = 'none';
        } else if (status === 'available') {
          updateStatusDisplay.textContent = 'Available';
          checkUpdatesBtn.textContent = 'Download';
          checkUpdatesBtn.style.display = '';
          checkUpdatesBtn.disabled = false;
          checkUpdatesBtn.onclick = async () => {
            checkUpdatesBtn.style.display = 'none';
            updateStatusDisplay.textContent = 'Downloading...';
            await window.api.downloadUpdate();
          };
        } else if (status === 'downloading') {
          const progress = info.downloadProgress;
          const percent = Math.round(progress.percent);
          updateStatusDisplay.textContent = `${percent}%`;
          checkUpdatesBtn.style.display = 'none';
        } else if (status === 'ready') {
          updateStatusDisplay.textContent = '';
          checkUpdatesBtn.textContent = 'Restart & Install';
          checkUpdatesBtn.style.display = '';
          checkUpdatesBtn.disabled = false;
          checkUpdatesBtn.onclick = async () => {
            await window.api.installUpdate();
          };
        } else if (status === 'not-available') {
          updateStatusDisplay.textContent = 'Up to date';
          checkUpdatesBtn.textContent = 'Check';
          checkUpdatesBtn.style.display = '';
          checkUpdatesBtn.disabled = false;
          checkUpdatesBtn.onclick = async () => {
            checkUpdatesBtn.style.display = 'none';
            updateStatusDisplay.textContent = 'Checking...';
            try {
              await window.api.checkForUpdates();
            } catch (err) {
              updateStatusDisplay.textContent = 'Error checking updates';
              checkUpdatesBtn.style.display = '';
              console.error('Failed to check for updates:', err);
            }
          };
        } else if (status === 'error') {
          updateStatusDisplay.textContent = 'Error';
          checkUpdatesBtn.textContent = 'Check';
          checkUpdatesBtn.style.display = '';
          checkUpdatesBtn.disabled = false;
        }
      });
    }

    // Load initial update status
    if (window.api && window.api.getUpdateStatus) {
      window.api.getUpdateStatus().then(({ status, info }) => {
        if (status === 'available') {
          updateStatusDisplay.textContent = 'Available';
          checkUpdatesBtn.textContent = 'Download';
          checkUpdatesBtn.style.display = '';
          checkUpdatesBtn.disabled = false;
          checkUpdatesBtn.onclick = async () => {
            checkUpdatesBtn.style.display = 'none';
            updateStatusDisplay.textContent = 'Downloading...';
            await window.api.downloadUpdate();
          };
        } else if (status === 'downloading') {
          const progress = info.downloadProgress;
          const percent = Math.round(progress.percent);
          updateStatusDisplay.textContent = `${percent}%`;
          checkUpdatesBtn.style.display = 'none';
        } else if (status === 'ready') {
          updateStatusDisplay.textContent = '';
          checkUpdatesBtn.textContent = 'Restart & Install';
          checkUpdatesBtn.style.display = '';
          checkUpdatesBtn.onclick = async () => {
            await window.api.installUpdate();
          };
        } else if (status === 'not-available') {
          updateStatusDisplay.textContent = 'Up to date';
          checkUpdatesBtn.textContent = 'Check';
          checkUpdatesBtn.style.display = '';
        }
      });
    }

    function getThemeLabel(themeKey) {
      const theme = themeCatalog[themeKey];
      if (!theme) {
        return themeKey;
      }
      return theme.label || theme.name || themeKey;
    }

    function updateThemePickerSummary() {
      themePickerBtn.textContent = getThemeLabel(activeTheme);
      themeModalHeader.textContent = `Current: ${getThemeLabel(activeTheme)}`;
    }

    function renderThemeOptions() {
      themeModalList.innerHTML = '';
      Object.keys(themeCatalog).forEach((themeKey) => {
        const option = document.createElement('button');
        option.type = 'button';
        option.className = `theme-option${themeKey === activeTheme ? ' active' : ''}`;
        option.innerHTML = `
          <span class="theme-option-label">${getThemeLabel(themeKey)}</span>
          <span class="theme-option-status">${themeKey === activeTheme ? 'Applied' : ''}</span>
        `;
        option.addEventListener('click', async () => {
          if (window.api && window.api.setTheme) {
            try {
              await window.api.setTheme(themeKey);
              activeTheme = themeKey;
              updateThemePickerSummary();
              renderThemeOptions();
              closeThemeModal();
            } catch (err) {
              console.error('Failed to set theme:', err);
            }
          }
        });
        themeModalList.appendChild(option);
      });
    }

    function openThemeModal() {
      closePetModal();
      renderThemeOptions();
      themeModal.classList.add('show');
      settingsContainer?.classList.add('modal-open');
    }

    function closeThemeModal() {
      themeModal.classList.remove('show');
      if (!petModal.classList.contains('show')) {
        settingsContainer?.classList.remove('modal-open');
      }
    }

    function getPetLabel(petKey) {
      const pet = petCatalog[petKey];
      if (!pet) {
        return petKey;
      }
      return pet.label || petKey;
    }

    function updatePetPickerSummary() {
      petPickerBtn.textContent = getPetLabel(activePet);
      petModalHeader.textContent = `Current: ${getPetLabel(activePet)}`;
    }

    function renderPetOptions() {
      petModalList.innerHTML = '';
      Object.keys(petCatalog).forEach((petKey) => {
        const option = document.createElement('button');
        option.type = 'button';
        option.className = `theme-option${petKey === activePet ? ' active' : ''}`;
        option.innerHTML = `
          <span class="theme-option-label">${getPetLabel(petKey)}</span>
          <span class="theme-option-status">${petKey === activePet ? 'Applied' : ''}</span>
        `;
        option.addEventListener('click', async () => {
          if (window.api && window.api.setPetSelection) {
            try {
              await window.api.setPetSelection(petKey);
              activePet = petKey;
              updatePetPickerSummary();
              renderPetOptions();
              closePetModal();
            } catch (err) {
              console.error('Failed to set pet selection:', err);
            }
          }
        });
        petModalList.appendChild(option);
      });
    }

    function openPetModal() {
      closeThemeModal();
      renderPetOptions();
      petModal.classList.add('show');
      settingsContainer?.classList.add('modal-open');
    }

    function closePetModal() {
      petModal.classList.remove('show');
      if (!themeModal.classList.contains('show')) {
        settingsContainer?.classList.remove('modal-open');
      }
    }

    themePickerBtn.addEventListener('click', () => {
      openThemeModal();
    });

    petPickerBtn.addEventListener('click', () => {
      openPetModal();
    });

    themeModal.addEventListener('click', (event) => {
      if (event.target === themeModal) {
        closeThemeModal();
      }
    });

    petModal.addEventListener('click', (event) => {
      if (event.target === petModal) {
        closePetModal();
      }
    });
    // Source mode toggle
    function applySourceMode(mode) {
      if (mode === 'local') {
        localSource.classList.add('active');
        spotifySource.classList.remove('active');
      } else {
        spotifySource.classList.add('active');
        localSource.classList.remove('active');
      }
    }
    // Load source mode preference on startup
    async function loadSourceModePreference() {
      if (window.api && window.api.getSourceMode) {
        const mode = await window.api.getSourceMode().catch(() => 'spotify');
        applySourceMode(mode);
      }
    }
    // Handle source mode changes
    spotifySource.addEventListener('click', () => {
      applySourceMode('spotify');
      if (window.api && window.api.setSourceMode) {
        window.api.setSourceMode('spotify').catch(err => console.error('Failed to set source mode:', err));
      }
    });
    // Handle source mode changes
    localSource.addEventListener('click', () => {
      applySourceMode('local');
      if (window.api && window.api.setSourceMode) {
        window.api.setSourceMode('local').catch(err => console.error('Failed to set source mode:', err));
      }
    });

    // Sign out button
    signOutBtn.addEventListener('click', () => {
      showConfirm('Are you sure you want to sign out?', async () => {
        try {
          await window.api.logout();
          hideConfirm();
        } catch (err) {
          console.error('Logout failed', err);
          hideConfirm();
        }
      });
    });

    // Clear cache button
    function resetCacheDialogSelection() {
      cacheOptionNodes.forEach((node) => {
        node.checked = false;
      });
      cacheSelectAll.checked = false;
    }

    function openCacheDialog() {
      resetCacheDialogSelection();
      const container = document.querySelector('.settings-container');
      if (container) {
        container.scrollTop = 0;
      }
      settingsTitle.textContent = 'Clear Cache';
      settingsMainSection.style.display = 'none';
      settingsButtons.style.display = 'none';
      closeSettingsBtn.textContent = 'Back';
      closeSettingsBtn.title = 'Back';
      closeSettingsBtn.classList.add('back-mode');
      cacheDialog.classList.add('show');
    }

    function closeCacheDialog() {
      cacheDialog.classList.remove('show');
      settingsMainSection.style.display = '';
      settingsButtons.style.display = 'flex';
      settingsTitle.textContent = 'Settings';
      closeSettingsBtn.textContent = '✕';
      closeSettingsBtn.title = 'Close';
      closeSettingsBtn.classList.remove('back-mode');
    }

    clearCacheBtn.addEventListener('click', openCacheDialog);

    cacheSelectAll.addEventListener('change', () => {
      cacheOptionNodes.forEach((node) => {
        node.checked = cacheSelectAll.checked;
      });
    });

    cacheOptionNodes.forEach((node) => {
      node.addEventListener('change', () => {
        cacheSelectAll.checked = cacheOptionNodes.every((option) => option.checked);
      });
    });

    cacheDialogApplyBtn.addEventListener('click', async () => {
      const selectedOptions = cacheOptionNodes
        .filter((node) => node.checked)
        .map((node) => node.value);

      if (!selectedOptions.length) {
        closeCacheDialog();
        return;
      }

      closeCacheDialog();
      showConfirm(`Clear ${selectedOptions.length} selected item(s)?`, async () => {
        try {
          const result = await window.api.clearSelectedCache(selectedOptions);
          if (result.success) {
            confirmMessage.textContent = `${result.message} Restart app now?`;
            confirmYes.textContent = 'Restart Now';
            confirmYes.onclick = () => {
              window.api.restartApp();
            };
            confirmNo.style.display = 'block';
            confirmNo.textContent = 'Later';
          } else {
            confirmMessage.textContent = result.message;
          }
        } catch (err) {
          console.error('Clear selected cache failed', err);
          confirmMessage.textContent = `Error: ${err.message}`;
        }
      });
    });

    // View patch notes button
    viewPatchBtn.addEventListener('click', async () => {
      try {
        await window.api.openPatchWindow();
      } catch (err) {
        console.error('Failed to open patch window:', err);
      }
    });

    openOnboardingBtn.addEventListener('click', async () => {
      try {
        await window.api.toggleOnboarding();
      } catch (err) {
        console.error('Failed to open onboarding:', err);
      }
    });

    openSetupBtn.addEventListener('click', async () => {
      try {
        await window.api.toggleSetup();
      } catch (err) {
        console.error('Failed to open Spotify setup window:', err);
      }
    });

    supportBtn.addEventListener('click', async () => {
      try {
        await window.api.openBuyMeACoffee?.();
      } catch (err) {
        console.error('Failed to open Buy Me a Coffee:', err);
      }
    });

    function showConfirm(message, action) {
      confirmMessage.textContent = message;
      confirmDialog.classList.add('show');
      confirmAction = action;
    }

    function hideConfirm() {
      confirmDialog.classList.remove('show');
      confirmMessage.textContent = '';
      confirmAction = null;
      // Reset buttons
      confirmYes.textContent = 'Confirm';
      confirmYes.onclick = null;
      confirmNo.textContent = 'Cancel';
      confirmNo.style.display = 'block';
    }

    confirmYes.addEventListener('click', () => {
      if (confirmAction) {
        confirmAction();
      }
    });

    confirmNo.addEventListener('click', () => {
      hideConfirm();
    });

    // Listen for authentication state changes
    if (window.api && window.api.onLoggedOut) {
      window.api.onLoggedOut(() => {
        // Handle logged out state - could disable sign out button
      });
    }

    if (window.api && window.api.onSourceModeChanged) {
      window.api.onSourceModeChanged((_e, mode) => {
        applySourceMode(mode);
      });
    }

    if (window.api && window.api.onLocalAudioSourcesChanged) {
      window.api.onLocalAudioSourcesChanged((_e, sources) => {
        renderLocalAudioSources(sources);
      });
    }

    // Load theme preference
    async function loadThemePreference() {
      if (window.api && window.api.getTheme) {
        const theme = await window.api.getTheme().catch(() => 'dark');
        activeTheme = theme;
        updateThemePickerSummary();
        renderThemeOptions();
      }
    }

    async function loadPetPreference() {
      if (window.api && window.api.getPetSelection) {
        const pet = await window.api.getPetSelection().catch(() => 'none');
        activePet = pet;
        updatePetPickerSummary();
        renderPetOptions();
      }
    }

    async function loadPreferences() {
      await Promise.all([
        loadThemePreference(),
        loadPetPreference(),
        loadSourceModePreference()
      ]);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadPreferences);
    } else {
      loadPreferences();
    }

    // Initialize theme
    initThemeVariables();
    loadInitialTheme();
    setupThemeListener((theme) => {
      activeTheme = theme;
      updateThemePickerSummary();
      renderThemeOptions();
    });
  </script>
</body>
</html>
